    <main>
        <section class="services-section" style="padding-top: 150px; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <div class="section-header animate-on-scroll fade-in-up" style="margin-bottom: 40px;">
                <h2 style="font-size: 4rem;">Let's <span class="text-gradient">Connect</span></h2>
                <p style="font-size: 1.2rem;">Reach out to me directly via WhatsApp or Phone Call.</p>
            </div>
            
            <div class="services-grid" style="display: flex; gap: 40px; justify-content: center; max-width: 800px; margin: 0 auto; width: 100%;">
                
                <!-- WhatsApp -->
                <a href="https://wa.me/256744219162" target="_blank" style="text-decoration: none; color: inherit; flex: 1;">
                    <div class="service-card glass-panel animate-on-scroll fade-in-up delay-1" style="text-align: center; height: 100%;">
                        <div class="icon-box" style="margin: 0 auto 25px; background: rgba(37, 211, 102, 0.1); color: #25D366;">

                        </div>
                        <h3>WhatsApp</h3>
                        <p style="font-size: 1.5rem; font-weight: bold; margin-top: 10px; color: var(--text-primary);">0744 219 162</p>
                        <p style="color: var(--accent-color); margin-top: 10px; font-size: 0.9rem;">Click to chat</p>
                    </div>
                </a>

                <!-- Phone Call -->
                <a href="tel:0702595326" style="text-decoration: none; color: inherit; flex: 1;">
                    <div class="service-card glass-panel animate-on-scroll fade-in-up delay-2" style="text-align: center; height: 100%;">
                        <div class="icon-box" style="margin: 0 auto 25px;">
                            <i class="fas fa-phone-alt" style="font-size: 2rem;"></i>
                        </div>
                        <h3>Phone Call</h3>
                        <p style="font-size: 1.5rem; font-weight: bold; margin-top: 10px; color: var(--text-primary);">0702 595 326</p>
                        <p style="color: var(--accent-color); margin-top: 10px; font-size: 0.9rem;">Click to call</p>
                    </div>
